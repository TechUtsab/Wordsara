<!DOCTYPE html>
<html lang="hi" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <title>Wordsara Studio | Professional Reel & Post Maker</title>
  <meta name="description" content="Wordsara Studio is a professional online tool to design high-quality quotes, social media posts, and 1080p video reels with custom typography and animated backgrounds." />
  <meta name="keywords" content="Wordsara, Quote Maker, Reel Generator, Text on Video, Typography Tool, Instagram Post Maker, Online Studio" />
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Poppins:wght@300;400;600;800&family=Hind:wght@400;500;700&family=Mukta:wght@400;700&family=Teko:wght@500;700&display=swap"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    :root { --oled-black: #000000; --neon-green: #39FF14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.12); }
    
    * { box-sizing: border-box; }

    body { 
      background-color: var(--oled-black); 
      color: #fff; 
      font-family: 'Poppins', sans-serif; 
      padding-top: 80px; 
      overflow-x: hidden; 
      width: 100vw; 
      margin: 0;
    }
    
    .app-bar { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 0.8rem 1.5rem; position: fixed; top: 0; width: 100%; z-index: 2000; display: flex; justify-content: space-between; align-items: center; }
    
    .main-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; width: 100%; max-width: 1400px; margin: 1rem auto; padding: 0 1rem; justify-items: center; }
    @media (min-width: 992px) { .main-grid { grid-template-columns: 1fr 1fr; align-items: start; padding: 0 1.5rem; } }

    .control-panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 2rem; width: 100%; max-width: 500px; margin: 0 auto; }
    .section-label { color: var(--neon-green); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 0.8rem; text-transform: uppercase; }
    .section-label i { margin-right: 8px; color: #fff; }

    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 15px; justify-content: center; }
    .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
    .color-btn:hover { transform: scale(1.1); border-color: #fff; }

    .big-editor { background: rgba(0,0,0,0.5) !important; border: 1px solid var(--glass-border) !important; color: #fff !important; border-radius: 15px; font-size: 1.1rem; padding: 1.2rem !important; resize: none; }

    .preview-stage { width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; padding-bottom: 2rem; }
    
    .studio-border-wrapper { 
      padding: 12px; 
      background: #111; 
      border: 2px solid var(--neon-green); 
      border-radius: 24px; 
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.15);
      display: inline-block;
      transition: transform 0.3s ease;
      transform-origin: top center;
      margin: 0 auto; 
    }

    @media (max-width: 500px) {
      .app-bar { padding: 0.6rem 1rem; }
      .app-bar h1 { font-size: 1.2rem !important; }
      .control-panel { padding: 1.2rem; }
      .studio-border-wrapper { transform: scale(0.85); margin-bottom: -90px; }
    }
    @media (max-width: 400px) {
      .app-bar h1 { font-size: 1.1rem !important; }
      .app-bar .btn { font-size: 1rem !important; padding: 0.3rem 0.6rem; }
      .studio-border-wrapper { transform: scale(0.72); margin-bottom: -160px; }
    }
    @media (max-width: 350px) {
      .control-panel { padding: 1rem; }
      .studio-border-wrapper { transform: scale(0.62); margin-bottom: -220px; }
    }

    .preview-box { background: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; }
    .reel-frame { width: 340px; height: 604px; }
    .square-frame { width: 400px; height: 400px; }
    
    .bg-layer { position: absolute; inset: 0; z-index: 0; overflow: hidden; transition: transform 0.1s, filter 0.1s, opacity 0.1s; }
    #realBgImg, #realBgVid { width: 100%; height: 100%; object-fit: cover; object-position: center; display: none; }
    
    .overlay-dim { position: absolute; inset: 0; z-index: 1; }
    .content-area { position: relative; z-index: 10; width: 80%; display: flex; flex-direction: column; align-items: center; }
    .main-text { line-height: 1.6; text-shadow: 0 2px 10px #000; white-space: pre-wrap; word-wrap: break-word; }
    .author-meta { margin-top: 20px; font-weight: 700; opacity: 0.9; text-align: right; width: 100%; }

    .branding-footer { position: absolute; z-index: 10; text-align: center; width: 100%; }
    .reel-frame .branding-footer { bottom: 120px; } 
    .square-frame .branding-footer { bottom: 40px; }

    .fixed-watermark { font-size: 11px; color: #ffffff; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0px; letter-spacing: 0.5px; }
    .brand-icons { color: #FFFF00; display: flex; gap: 2px; font-size: 12px; margin-right: 2px; }

    .btn-group-custom .btn { border: 1px solid var(--glass-border); color: #fff; background: rgba(255,255,255,0.05); }
    .btn-group-custom .btn.active { background: var(--neon-green); color: #000; }
    
    .btn-export { background: linear-gradient(45deg, var(--neon-green), #24f000); color: #000; font-weight: 800; border: none; padding: 1rem; border-radius: 12px; width: 100%; transition: 0.3s; margin-top: 10px; }
    .btn-export:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2); }
    
    .btn-video { background: linear-gradient(45deg, #00D2FF, #3a7bd5); color: #fff; font-weight: 800; border: none; padding: 1rem; border-radius: 12px; width: 100%; transition: 0.3s; margin-top: 10px; }
    .btn-video:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2); }

    #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    
    .custom-range::-webkit-slider-thumb { background: var(--neon-green); }
    .custom-range::-moz-range-thumb { background: var(--neon-green); }
    .input-group-text.custom-label { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); border-left: none; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-success mb-3" role="status"></div>
    <h6 class="text-white fw-bold" id="loaderText">STUDIO RENDERING...</h6>
  </div>

  <header class="app-bar">
    <h1 class="fw-bold h4 mb-0"><i class="fa-solid fa-pen-ruler me-2"></i>WORDSARA <span style="color:var(--neon-green)">STUDIO</span></h1>
    <button class="btn btn-outline-success border-0 fs-5" onclick="location.reload()" aria-label="Reload App" title="Reload Studio"><i class="fa-solid fa-arrows-rotate"></i></button>
  </header>

  <main class="main-grid">
    <section class="control-panel" aria-label="Editor Controls">
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="section-label m-0"><i class="fa-solid fa-file-pen"></i>Content Designer</h2>
            <button class="text-danger border-0 bg-transparent" onclick="clearAllText()" aria-label="Clear Text" title="Delete All Text"><i class="fa-solid fa-trash-can"></i></button>
        </div>
        <textarea class="form-control big-editor" id="mText" rows="4" aria-label="Quote Text Input">ख्वाहिशों से नहीं गिरते [color=#39FF14]फूल[/color] झोली में, कर्म की शाख को हिलाना होगा।</textarea>
        <div class="color-palette" aria-label="Color Palette">
          <button class="color-btn" style="background: #39FF14;" aria-label="Green" onmousedown="event.preventDefault(); applyColor('#39FF14')" ontouchstart="event.preventDefault(); applyColor('#39FF14')"></button>
          <button class="color-btn" style="background: #FF0000;" aria-label="Red" onmousedown="event.preventDefault(); applyColor('#FF0000')" ontouchstart="event.preventDefault(); applyColor('#FF0000')"></button>
          <button class="color-btn" style="background: #00D2FF;" aria-label="Cyan" onmousedown="event.preventDefault(); applyColor('#00D2FF')" ontouchstart="event.preventDefault(); applyColor('#00D2FF')"></button>
          <button class="color-btn" style="background: #FF00FF;" aria-label="Magenta" onmousedown="event.preventDefault(); applyColor('#FF00FF')" ontouchstart="event.preventDefault(); applyColor('#FF00FF')"></button>
          <button class="color-btn" style="background: #FFFF00;" aria-label="Yellow" onmousedown="event.preventDefault(); applyColor('#FFFF00')" ontouchstart="event.preventDefault(); applyColor('#FFFF00')"></button>
          <button class="color-btn" style="background: #FFAC1C;" aria-label="Orange" onmousedown="event.preventDefault(); applyColor('#FFAC1C')" ontouchstart="event.preventDefault(); applyColor('#FFAC1C')"></button>
          <button class="color-btn" style="background: #ffffff;" aria-label="White" onmousedown="event.preventDefault(); applyColor('#ffffff')" ontouchstart="event.preventDefault(); applyColor('#ffffff')"></button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6">
          <p class="section-label"><i class="fa-solid fa-spell-check"></i>Typography</p>
          <select class="form-select" id="mFont" onchange="update()" aria-label="Font Selection">
            <option value="'Hind', sans-serif" selected>Hind (Professional)</option>
            <option value="'Noto Sans Devanagari', sans-serif">Noto Sans (Modern)</option>
            <option value="'Mukta', sans-serif">Mukta (Clean)</option>
            <option value="'Teko', sans-serif">Teko (Stylized)</option>
            <option value="'Poppins', sans-serif">Poppins (English Best)</option>
          </select>
        </div>
        <div class="col-6">
            <p class="section-label"><i class="fa-solid fa-bold"></i>Style</p>
            <button class="btn btn-outline-secondary w-100" id="boldToggle" onclick="toggleBold()" aria-label="Toggle Bold Text"><i class="fa-solid fa-bold"></i> BOLD</button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6"><p class="section-label"><i class="fa-solid fa-align-center"></i>Align</p>
          <div class="btn-group btn-group-custom w-100" role="group" aria-label="Text Alignment">
            <button class="btn btn-sm" id="align-left" onclick="setAlign('left', this)" aria-label="Align Left"><i class="fa-solid fa-align-left"></i></button>
            <button class="btn btn-sm active" id="align-center" onclick="setAlign('center', this)" aria-label="Align Center"><i class="fa-solid fa-align-center"></i></button>
            <button class="btn btn-sm" id="align-right" onclick="setAlign('right', this)" aria-label="Align Right"><i class="fa-solid fa-align-right"></i></button>
          </div>
        </div>
        <div class="col-6">
          <p class="section-label"><i class="fa-solid fa-text-height"></i>Size</p>
          <input type="number" class="form-control" id="mSize" value="15" oninput="update()" aria-label="Font Size">
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6"><p class="section-label"><i class="fa-solid fa-crop-simple"></i>Ratio</p>
          <select class="form-select" id="mFrame" onchange="update()" aria-label="Aspect Ratio">
            <option value="reel-frame">9:16 Reel</option>
            <option value="square-frame">1:1 Post</option>
          </select>
        </div>
        <div class="col-6"><p class="section-label"><i class="fa-solid fa-moon"></i>Text Dim</p>
          <input type="number" class="form-control" id="mDim" value="5" min="0" max="9" oninput="update()" aria-label="Background Dim Level">
        </div>
      </div>

      <div class="mb-4">
        <p class="section-label"><i class="fa-solid fa-user-edit"></i>Author Name</p>
        <input type="text" class="form-control" id="mAuth" placeholder="Your Name" oninput="update()" aria-label="Author Name">
      </div>
      
      <div class="mb-4">
        <p class="section-label"><i class="fa-solid fa-image"></i>Background (Image/Video)</p>
        <input type="file" class="form-control" id="mBg" accept="image/*, video/*" aria-label="Upload Background">
        
        <div id="bgControls" class="mt-3 p-3" style="display: none; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--glass-border);">
          <p class="section-label text-warning mb-3"><i class="fa-solid fa-sliders"></i> Media Tuning</p>
          <label for="mZoom" class="form-label text-light mb-0" style="font-size: 0.8rem;">Zoom In/Out</label>
          <input type="range" class="form-range custom-range mb-2" id="mZoom" min="1" max="3" step="0.05" value="1" oninput="update()">
          <label for="mBlur" class="form-label text-light mb-0" style="font-size: 0.8rem;">Blur Amount</label>
          <input type="range" class="form-range custom-range mb-2" id="mBlur" min="0" max="25" step="1" value="0" oninput="update()">
          <label for="mOpacity" class="form-label text-light mb-0" style="font-size: 0.8rem;">Visibility (Opacity)</label>
          <input type="range" class="form-range custom-range" id="mOpacity" min="0.1" max="1" step="0.1" value="1" oninput="update()">
        </div>
      </div>
      
      <hr style="border-color: rgba(255,255,255,0.2);">

      <div class="row g-3 mb-2 align-items-end">
        <div class="col-md-6">
           <p class="section-label"><i class="fa-solid fa-image"></i> Image Export</p>
           <select class="form-select mb-2" id="mQuality" aria-label="Export Quality">
             <option value="4" selected>4K Resolution</option>
             <option value="8">8K Master</option>
           </select>
           <button class="btn btn-export" onclick="exportImg()"><i class="fa-solid fa-download me-2"></i> SAVE IMAGE</button>
        </div>
        
        <div class="col-md-6">
           <p class="section-label text-info"><i class="fa-solid fa-video"></i> Video Export (1080p)</p>
           <div class="input-group mb-2">
             <input type="number" class="form-control border-end-0" id="mVidDuration" value="15" min="1" max="300" aria-label="Video Duration in Seconds">
             <span class="input-group-text custom-label">Sec</span>
           </div>
           <button class="btn btn-video" onclick="exportVideo()"><i class="fa-solid fa-film me-2"></i> SAVE VIDEO</button>
        </div>
      </div>
    </section>

    <section class="preview-stage" aria-label="Live Preview">
      <div class="studio-border-wrapper" id="previewWrapper">
        <div class="preview-box reel-frame" id="exportArea">
          
          <div class="bg-layer" id="bgLayer">
            <img id="realBgImg" src="" alt="Background Image">
            <video id="realBgVid" autoplay loop muted playsinline crossorigin="anonymous"></video>
          </div>
          
          <div class="overlay-dim" id="dimmer"></div>
          <div class="content-area">
            <div class="main-text" id="pText" style="text-align: center;"></div>
            <div class="author-meta" id="pAuthName"></div>
          </div>
          
          <div class="branding-footer">
            <div class="fixed-watermark">
              <div class="brand-icons"><i class="fa-brands fa-instagram"></i><i class="fa-brands fa-youtube"></i></div><span>wordsaraa</span>
            </div>
          </div>
          
        </div>
      </div>
    </section>
    
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const DOM = {
      mText: document.getElementById('mText'),
      mFont: document.getElementById('mFont'),
      mSize: document.getElementById('mSize'),
      mAuth: document.getElementById('mAuth'),
      mDim: document.getElementById('mDim'),
      mFrame: document.getElementById('mFrame'),
      exportArea: document.getElementById('exportArea'),
      previewWrapper: document.getElementById('previewWrapper'),
      dimmer: document.getElementById('dimmer'),
      pText: document.getElementById('pText'),
      pAuthName: document.getElementById('pAuthName'),
      realBgImg: document.getElementById('realBgImg'),
      realBgVid: document.getElementById('realBgVid'),
      bgLayer: document.getElementById('bgLayer'),
      mBg: document.getElementById('mBg'),
      bgControls: document.getElementById('bgControls'),
      mZoom: document.getElementById('mZoom'),
      mBlur: document.getElementById('mBlur'),
      mOpacity: document.getElementById('mOpacity'),
      boldToggle: document.getElementById('boldToggle'),
      loader: document.getElementById('loader'),
      loaderText: document.getElementById('loaderText'),
      mQuality: document.getElementById('mQuality'),
      mVidDuration: document.getElementById('mVidDuration')
    };

    let bgData = null;
    let bgIsVideo = false;
    let currentAlign = 'center';
    let isBold = false;

    window.onload = () => {
      const savedText = localStorage.getItem('wordsara_text');
      const savedAuth = localStorage.getItem('wordsara_auth');
      if (savedText) DOM.mText.value = savedText;
      if (savedAuth) DOM.mAuth.value = savedAuth;
      update();
    };

    function clearAllText() { 
      DOM.mText.value = ""; 
      localStorage.removeItem('wordsara_text');
      update(); 
    }
    
    function toggleBold() { 
      isBold = !isBold; 
      DOM.boldToggle.classList.toggle('active', isBold); 
      update(); 
    }
    
    function applyColor(hex) {
      const start = DOM.mText.selectionStart, end = DOM.mText.selectionEnd;
      if (start !== end) {
        DOM.mText.value = DOM.mText.value.substring(0, start) + `[color=${hex}]` + DOM.mText.value.substring(start, end) + `[/color]` + DOM.mText.value.substring(end);
        update();
      }
    }
    
    function setAlign(align, btn) {
      currentAlign = align;
      document.querySelectorAll('.btn-group-custom .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); 
      update();
    }

    function update() {
      const text = DOM.mText.value;
      const size = parseInt(DOM.mSize.value) || 15;
      const font = DOM.mFont.value;
      const auth = DOM.mAuth.value;
      const dim = DOM.mDim.value;
      
      localStorage.setItem('wordsara_text', text);
      localStorage.setItem('wordsara_auth', auth);

      DOM.exportArea.className = `preview-box ${DOM.mFrame.value}`;
      DOM.dimmer.style.background = `rgba(0,0,0, 0.${dim})`;
      
      const escapedText = text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#039;");

      DOM.pText.innerHTML = escapedText.replace(
        /\[color=(#[0-9A-Fa-f]{6})\](.*?)\[\/color\]/g,
        '<span style="color:$1">$2</span>'
      );
      
      DOM.pText.style.cssText = `text-align: ${currentAlign}; font-size: ${size}px; font-family: ${font}; font-weight: ${isBold ? '700' : '400'};`;
      
      DOM.pAuthName.innerText = auth ? `~ ${auth}` : "";
      DOM.pAuthName.style.cssText = `font-size: ${size - 2}px; font-family: ${font}; font-weight: ${isBold ? '700' : '400'};`;

      if(bgData) {
        const zoom = DOM.mZoom.value;
        const blur = DOM.mBlur.value;
        const opacity = DOM.mOpacity.value;
        
        if (bgIsVideo) {
            DOM.realBgImg.style.display = 'none';
            DOM.realBgVid.style.display = 'block';
            if(DOM.realBgVid.src !== bgData) {
                DOM.realBgVid.src = bgData;
                DOM.realBgVid.play();
            }
        } else {
            DOM.realBgVid.style.display = 'none';
            DOM.realBgVid.pause();
            DOM.realBgImg.style.display = 'block';
            if(DOM.realBgImg.src !== bgData) {
                DOM.realBgImg.src = bgData;
            }
        }
        
        DOM.bgLayer.style.transform = `scale(${zoom})`;
        DOM.bgLayer.style.filter = `blur(${blur}px)`;
        DOM.bgLayer.style.opacity = opacity;
      } else {
        DOM.realBgImg.style.display = 'none';
        DOM.realBgVid.style.display = 'none';
        DOM.realBgVid.pause();
        DOM.realBgImg.src = '';
        DOM.realBgVid.src = '';
        DOM.bgLayer.style.transform = `scale(1)`;
        DOM.bgLayer.style.filter = `blur(0px)`;
        DOM.bgLayer.style.opacity = 1;
      }
    }

    DOM.mBg.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) {
        DOM.bgControls.style.display = 'none';
        bgData = null;
        update();
        return;
      }

      if (bgData && bgData.startsWith('blob:')) {
          URL.revokeObjectURL(bgData);
      }

      bgData = URL.createObjectURL(file);
      bgIsVideo = file.type.startsWith('video/');

      DOM.bgControls.style.display = 'block';
      DOM.mZoom.value = 1;
      DOM.mBlur.value = 0;
      DOM.mOpacity.value = 1;
      
      update();
    };

    DOM.mText.addEventListener('input', update);

    async function exportImg() {
      const q = parseInt(DOM.mQuality.value);
      DOM.loader.style.display = 'flex';
      DOM.loaderText.innerText = "RENDERING IMAGE...";
      
      const originalTransform = DOM.previewWrapper.style.transform;
      DOM.previewWrapper.style.transform = 'none';
      const originalRadius = DOM.exportArea.style.borderRadius;
      DOM.exportArea.style.borderRadius = "0px";

      setTimeout(async () => {
        try {
          const canvas = await html2canvas(DOM.exportArea, { scale: q, useCORS: true, backgroundColor: "#000000", logging: false });
          const link = document.createElement('a');
          link.download = `Wordsara_Image_${Date.now()}.png`;
          link.href = canvas.toDataURL("image/png", 1.0);
          link.click();
        } catch(e) {
            alert("Export failed. Try 4K.");
        } finally { 
          DOM.exportArea.style.borderRadius = originalRadius; 
          DOM.previewWrapper.style.transform = originalTransform;
          DOM.loader.style.display = 'none'; 
        }
      }, 500);
    }

    // --- VIDEO EXPORT ---
    async function exportVideo() {
      let duration = parseInt(DOM.mVidDuration.value);
      
      if (!duration || duration < 1) { alert("Please enter a valid time (at least 1 second)."); return; }
      if (duration > 300) { alert("Max video limit is 300 seconds (5 minutes) to prevent crashes."); return; }

      DOM.loader.style.display = 'flex';
      DOM.loaderText.innerText = "PREPARING VIDEO FRAMES...";
      
      const originalTransform = DOM.previewWrapper.style.transform;
      DOM.previewWrapper.style.transform = 'none';
      const originalRadius = DOM.exportArea.style.borderRadius;
      DOM.exportArea.style.borderRadius = "0px";

      try {
        const targetWidth = 1080;
        const scale = targetWidth / DOM.exportArea.offsetWidth;

        // FIX: Remove CSS background temporarily so html2canvas captures a transparent PNG for the text layer
        DOM.bgLayer.style.display = 'none';
        DOM.exportArea.style.background = 'transparent';

        const fgCanvas = await html2canvas(DOM.exportArea, {
          scale: scale, useCORS: true, backgroundColor: null, logging: false
        });

        // Restore original UI
        DOM.bgLayer.style.display = 'block';
        DOM.exportArea.style.background = '';
        DOM.exportArea.style.borderRadius = originalRadius;
        DOM.previewWrapper.style.transform = originalTransform;

        const videoCanvas = document.createElement('canvas');
        videoCanvas.width = fgCanvas.width;
        videoCanvas.height = fgCanvas.height;
        const ctx = videoCanvas.getContext('2d');

        const mimeTypes = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        let selectedMime = mimeTypes.find(mime => MediaRecorder.isTypeSupported(mime)) || '';

        const stream = videoCanvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: selectedMime, videoBitsPerSecond: 5000000 });

        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: selectedMime });
            const link = document.createElement('a');
            link.download = `Wordsara_Video_${Date.now()}.${selectedMime.includes('mp4') ? 'mp4' : 'webm'}`;
            link.href = URL.createObjectURL(blob);
            link.click();
            DOM.loader.style.display = 'none';
        };

        recorder.start();

        let startTime = Date.now();
        DOM.loaderText.innerText = `RECORDING: 0s / ${duration}s (DO NOT MINIMIZE)`;
        
        const zoom = parseFloat(DOM.mZoom.value) || 1;
        const blur = parseFloat(DOM.mBlur.value) || 0;
        const opacity = parseFloat(DOM.mOpacity.value) || 1;
        let mediaEl = bgData ? (bgIsVideo ? DOM.realBgVid : DOM.realBgImg) : null;

        let drawInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            if (elapsed >= duration) {
                clearInterval(drawInterval);
                recorder.stop();
                return;
            }
            DOM.loaderText.innerText = `RECORDING: ${elapsed}s / ${duration}s (DO NOT MINIMIZE)`;
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, videoCanvas.width, videoCanvas.height);
            
            if (mediaEl) {
                ctx.save();
                ctx.globalAlpha = opacity;
                if (blur > 0) ctx.filter = `blur(${blur * scale}px)`;
                ctx.translate(videoCanvas.width/2, videoCanvas.height/2);
                ctx.scale(zoom, zoom);
                
                const mWidth = bgIsVideo ? mediaEl.videoWidth : mediaEl.naturalWidth;
                const mHeight = bgIsVideo ? mediaEl.videoHeight : mediaEl.naturalHeight;
                
                if (mWidth && mHeight) {
                    const mRatio = mWidth / mHeight, cRatio = videoCanvas.width / videoCanvas.height;
                    let dW, dH;
                    if (mRatio > cRatio) { dH = videoCanvas.height; dW = dH * mRatio; } 
                    else { dW = videoCanvas.width; dH = dW / mRatio; }
                    ctx.drawImage(mediaEl, -dW/2, -dH/2, dW, dH);
                }
                ctx.restore();
            }
            
            // Draw transparent foreground text & dim overlay
            ctx.drawImage(fgCanvas, 0, 0);

        }, 1000 / 30);

      } catch (error) {
          alert("Video generation failed. Please try again.");
          DOM.loader.style.display = 'none';
          DOM.exportArea.style.background = '';
          DOM.exportArea.style.borderRadius = originalRadius;
          DOM.previewWrapper.style.transform = originalTransform;
          DOM.bgLayer.style.display = 'block'; 
      }
    }
  </script>
</body>
</html>
